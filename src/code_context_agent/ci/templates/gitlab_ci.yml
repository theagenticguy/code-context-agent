# Code Context Agent — CI/CD Integration
# Three cadences: nightly full analysis, on-merge incremental index, MR verdict

stages:
  - index
  - analyze
  - verdict

variables:
  UV_VERSION: "0.9"
  PYTHON_VERSION: "3.13"

.setup: &setup
  image: ghcr.io/astral-sh/uv:${UV_VERSION}-python${PYTHON_VERSION}-bookworm-slim
  before_script:
    - apt-get update -qq && apt-get install -qq -y git nodejs npm > /dev/null
    - npm install -g gitnexus
    - uv sync
  cache:
    key: code-context-${CI_COMMIT_REF_SLUG}
    paths:
      - .code-context/

# Nightly full analysis
nightly-analysis:
  <<: *setup
  stage: analyze
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $ANALYSIS_MODE == "nightly"
  script:
    - uv run code-context-agent analyze . --output-format json --quiet
  artifacts:
    paths:
      - .code-context/
    expire_in: 30 days
  timeout: 30 minutes

# Weekly deep analysis
weekly-deep-analysis:
  <<: *setup
  stage: analyze
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $ANALYSIS_MODE == "weekly_deep"
  script:
    - uv run code-context-agent analyze . --full --output-format json --quiet
  artifacts:
    paths:
      - .code-context/
    expire_in: 90 days
  timeout: 90 minutes

# On-merge incremental index
incremental-index:
  <<: *setup
  stage: index
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
  script:
    - uv run code-context-agent index .
  artifacts:
    paths:
      - .code-context/
    expire_in: 30 days
  timeout: 5 minutes

# MR verdict
mr-verdict:
  <<: *setup
  stage: verdict
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - >
      uv run code-context-agent verdict .
      --base origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}
      --output-format json > verdict.json || true
    - cat verdict.json
  artifacts:
    paths:
      - verdict.json
    expire_in: 7 days
  timeout: 5 minutes
