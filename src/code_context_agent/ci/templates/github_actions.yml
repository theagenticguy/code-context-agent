# Code Context Agent — CI/CD Integration
# Three cadences: nightly full analysis, on-merge incremental index, PR verdict
name: code-context-analysis

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 1 * * *'  # Nightly at 1am UTC
    - cron: '0 3 * * 0'  # Weekly deep analysis Sunday 3am UTC

env:
  UV_VERSION: "0.9"
  PYTHON_VERSION: "3.13"

jobs:
  # Nightly full analysis — refreshes risk profiles, patterns, temporal snapshots
  nightly-analysis:
    if: github.event_name == 'schedule' && github.event.schedule == '0 1 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync
      - run: npm install -g gitnexus
      - name: Run full analysis
        run: uv run code-context-agent analyze . --output-format json --quiet
        env:
          AWS_REGION: us-east-1
      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: code-context-analysis
          path: .code-context/
          retention-days: 30

  # Weekly deep analysis — highest fidelity, --full mode
  weekly-deep-analysis:
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync
      - run: npm install -g gitnexus
      - name: Run deep analysis
        run: uv run code-context-agent analyze . --full --output-format json --quiet
        env:
          AWS_REGION: us-east-1
      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: code-context-deep-analysis
          path: .code-context/
          retention-days: 90

  # On-merge incremental index — keeps structural graph current
  incremental-index:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync
      - run: npm install -g gitnexus
      - name: Download latest analysis
        uses: actions/download-artifact@v4
        with:
          name: code-context-analysis
          path: .code-context/
        continue-on-error: true
      - name: Incremental index
        run: uv run code-context-agent index .
      - name: Upload updated index
        uses: actions/upload-artifact@v4
        with:
          name: code-context-analysis
          path: .code-context/
          retention-days: 30

  # PR verdict — fast change analysis against cached context
  pr-verdict:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync
      - run: npm install -g gitnexus
      - name: Download latest analysis
        uses: actions/download-artifact@v4
        with:
          name: code-context-analysis
          path: .code-context/
        continue-on-error: true
      - name: Compute verdict
        id: verdict
        continue-on-error: true
        run: |
          uv run code-context-agent verdict . \
            --base origin/${{ github.base_ref }} \
            --output-format json \
            --exit-code > verdict.json
      - name: Save exit code
        if: always()
        run: echo "exit_code=${{ steps.verdict.outcome == 'success' && '0' || '1' }}" >> $GITHUB_OUTPUT
      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const verdict = JSON.parse(fs.readFileSync('verdict.json', 'utf8'));
              const body = verdict.review_comment_markdown ||
                `## Code Context Verdict: \`${verdict.verdict?.verdict || 'unknown'}\`\n\nSee workflow run for details.`;

              // Find and update existing comment or create new one
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const botComment = comments.find(c => c.body.includes('Code Context Verdict'));

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body,
                });
              }
            } catch (e) {
              console.log('Could not post verdict comment:', e.message);
            }
      - name: Apply labels
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const verdict = JSON.parse(fs.readFileSync('verdict.json', 'utf8'));
              const labels = verdict.github_labels || [];
              if (labels.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: labels,
                });
              }
            } catch (e) {
              console.log('Could not apply labels:', e.message);
            }
