stages:
  - lint
  - test
  - security
  - bump
  - deps-update
  - build-docs
  - pages
  - build
  - release

variables:
  UV_CACHE_DIR: .uv-cache
  UV_IMAGE: ghcr.io/astral-sh/uv:0.10-python3.13-bookworm-slim

# =============================================================================
# Lint & Type Check
# =============================================================================

lint:
  stage: lint
  image: $UV_IMAGE
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gcc libc6-dev graphviz libgraphviz-dev pkg-config
  script:
    - uv sync --locked --group dev
    # Generate Code Quality report (always, even if ruff finds issues)
    - uv run ruff check --output-format=gitlab --output-file=gl-code-quality-report.json src/ || true
    # Gating checks (fail the pipeline on errors)
    - uv run ruff check src/
    - uv run ruff format --check src/
    - uv run ty check src/
  artifacts:
    when: always
    reports:
      codequality: gl-code-quality-report.json
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
  cache:
    key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR

# =============================================================================
# Tests
# =============================================================================

test:
  stage: test
  image: $UV_IMAGE
  variables:
    GIT_DEPTH: 0
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git gcc libc6-dev graphviz libgraphviz-dev pkg-config
  script:
    - uv sync --locked --group dev
    - uv run pytest
        --junitxml=report.xml
        --cov=src/code_context_agent
        --cov-report=term-missing:skip-covered
        --cov-report=xml:coverage.xml
        --cov-branch
  coverage: '/TOTAL\s+\d+\s+\d+\s+\d+\s+\d+\s+(\d+(?:\.\d+)?%)\s*$/'
  artifacts:
    when: always
    paths:
      - coverage.xml
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
  cache:
    key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR

# =============================================================================
# Security Scans
# =============================================================================
# Each job produces a GitLab-compatible report artifact. GitLab auto-merges
# reports from separate jobs in the Security Dashboard / MR widget.
#
# Prerequisites for SARIF conversion:
#   sarif-converter is downloaded at runtime from ignis-build/sarif-converter

.security-base:
  stage: security
  image: $UV_IMAGE
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
  cache:
    key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR

sast:semgrep:
  extends: .security-base
  image: semgrep/semgrep:latest
  script:
    - semgrep scan
        --config auto
        --config p/owasp-top-ten
        --gitlab-sast
        --gitlab-sast-output gl-sast-semgrep.json
        --error
        src/
        || true
  artifacts:
    when: always
    reports:
      sast: gl-sast-semgrep.json
    expire_in: 1 week

sast:bandit:
  extends: .security-base
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gcc libc6-dev graphviz libgraphviz-dev pkg-config curl
  script:
    - uv sync --locked --group security
    - uv run bandit -c pyproject.toml -r src/ -f json -o bandit-report.json --exit-zero
    - uv run bandit -c pyproject.toml -r src/ -f sarif -o bandit.sarif --exit-zero
    # Convert SARIF to GitLab SAST format; skip gracefully if converter unavailable
    - |
      curl -fsSL -o /usr/local/bin/sarif-converter \
        "https://gitlab.com/ignis-build/sarif-converter/-/releases/permalink/latest/downloads/bin/sarif-converter-linux" \
        && chmod +x /usr/local/bin/sarif-converter \
        && sarif-converter --type sast bandit.sarif gl-sast-bandit.json \
        || echo "sarif-converter unavailable, skipping GitLab SAST conversion"
  artifacts:
    when: always
    paths:
      - bandit-report.json
      - bandit.sarif
    reports:
      sast: gl-sast-bandit.json
    expire_in: 1 week

deps:audit:
  extends: .security-base
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
    - |
      curl -fsSL -o /usr/local/bin/osv-scanner \
        "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64" \
        && chmod +x /usr/local/bin/osv-scanner
  script:
    - osv-scanner scan --format json --lockfile uv.lock > osv-scanner.json || true
    - osv-scanner scan --format sarif --lockfile uv.lock > osv-scanner.sarif || true
    # Convert SARIF to GitLab dependency scanning format; skip gracefully if converter unavailable
    - |
      curl -fsSL -o /usr/local/bin/sarif-converter \
        "https://gitlab.com/ignis-build/sarif-converter/-/releases/permalink/latest/downloads/bin/sarif-converter-linux" \
        && chmod +x /usr/local/bin/sarif-converter \
        && sarif-converter --type dependency_scanning osv-scanner.sarif gl-dependency-scanning-report.json \
        || echo "sarif-converter unavailable, skipping GitLab dependency scanning conversion"
  artifacts:
    when: always
    paths:
      - osv-scanner.json
      - osv-scanner.sarif
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
    expire_in: 1 week

secrets:gitleaks:
  extends: .security-base
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
  script:
    - gitleaks detect
        --source .
        --no-banner
        --report-format sarif
        --report-path gitleaks.sarif
        --exit-code 0
  artifacts:
    when: always
    paths:
      - gitleaks.sarif
    expire_in: 1 week

license:check:
  extends: .security-base
  allow_failure: false
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gcc libc6-dev graphviz libgraphviz-dev pkg-config
  script:
    - uv sync --locked
    - uv run --with pip-licenses pip-licenses
    # Generate JSON and markdown reports for archival
    - uv run --with pip-licenses pip-licenses
        --format=json --output-file=license-report.json
    - uv run --with pip-licenses pip-licenses
        --format=markdown --output-file=license-report.md
  artifacts:
    when: always
    paths:
      - license-report.json
      - license-report.md
    expire_in: 1 week

sbom:
  extends: .security-base
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh
        | sh -s -- -b /usr/local/bin
  script:
    - syft .
        -o cyclonedx-json=gl-sbom.cdx.json
        -o spdx-json=sbom.spdx.json
  artifacts:
    when: always
    paths:
      - gl-sbom.cdx.json
      - sbom.spdx.json
    reports:
      cyclonedx:
        - gl-sbom.cdx.json
    expire_in: 1 week

trivy:scan:
  extends: .security-base
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    # Scan the repo filesystem for vulnerabilities in lockfiles, configs, and IaC
    - trivy fs
        --severity HIGH,CRITICAL
        --format template
        --template "@/contrib/gitlab.tpl"
        --output gl-container-scanning-report.json
        .
        || true
  artifacts:
    when: always
    reports:
      container_scanning: gl-container-scanning-report.json
    expire_in: 1 week

# =============================================================================
# Version Bump (manual trigger → pushes bump commit + tag → triggers release)
# =============================================================================
# Prerequisites:
#   1. Create a project access token with write_repository scope
#   2. Add it as CI/CD variable RELEASE_TOKEN (masked, protected)
#   3. The token push creates the version tag, which triggers build + release

bump:
  stage: bump
  image: debian:bookworm-slim
  variables:
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates bash
    - curl https://mise.run | sh
    - export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
    - mise settings set disable_tools "gitleaks,semgrep"
    - mise install
    - uv sync --locked --group dev
  script:
    - git config user.name "gitlab-ci[bot]"
    - git config user.email "ci@${CI_SERVER_HOST}"
    - git remote set-url origin "https://release-bot:${RELEASE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git checkout ${CI_COMMIT_BRANCH}
    - mise run release
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
  cache:
    key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR

# =============================================================================
# Automated Dependency Update (scheduled nightly)
# =============================================================================
# Prerequisites:
#   1. RELEASE_TOKEN CI/CD variable (project access token, masked, protected)
#      - Scopes: write_repository, api
#      - Role: Developer
#   2. Pipeline schedule configured in Build > Pipeline schedules:
#      - Interval: 0 3 * * 1-5 (3 AM UTC, weekdays)
#      - Target branch: main
#      - Variable: DEPS_UPDATE = "true"

deps-update:
  stage: deps-update
  image: $UV_IMAGE
  variables:
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends
        git curl ca-certificates jq
        gcc libc6-dev graphviz libgraphviz-dev pkg-config
    - curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
        -o /usr/local/bin/osv-scanner && chmod +x /usr/local/bin/osv-scanner
  script:
    - |
      set -euo pipefail
      BRANCH_NAME="deps/auto-update-$(date +%Y-%m-%d)"

      # Skip if an MR from this branch already exists
      EXISTING_MR=$(curl --silent --header "PRIVATE-TOKEN: ${RELEASE_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests?state=opened&source_branch=${BRANCH_NAME}" \
        | jq -r '.[0].iid // empty')
      if [ -n "$EXISTING_MR" ]; then
        echo "MR !${EXISTING_MR} already open for ${BRANCH_NAME}. Skipping."
        exit 0
      fi

      # Upgrade all dependencies
      uv lock --upgrade

      # Skip if lockfile unchanged
      if git diff --quiet uv.lock; then
        echo "No dependency changes detected. Nothing to do."
        exit 0
      fi

      # Audit updated dependencies (advisory, does not block)
      osv-scanner scan --format json --lockfile uv.lock > /tmp/audit.json 2>/dev/null || true
      VULN_COUNT=$(jq '.results | map(.packages | length) | add // 0' /tmp/audit.json 2>/dev/null || echo "0")
      if [ "$VULN_COUNT" -gt 0 ]; then
        AUDIT_NOTE="**${VULN_COUNT} package(s)** with known vulnerabilities detected. Review audit report."
      else
        AUDIT_NOTE="All dependencies passed vulnerability audit."
      fi

      # Compute diff summary
      SUMMARY=$(git diff uv.lock | grep -E '^\+.*version' | head -20 | sed 's/^+//' || echo "See full diff")

      # Create branch, commit, push, and open MR
      git config user.name "gitlab-ci[bot]"
      git config user.email "ci@${CI_SERVER_HOST}"
      git remote set-url origin "https://release-bot:${RELEASE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git checkout -b "$BRANCH_NAME"
      git add uv.lock
      git commit -m "deps: auto-update dependencies $(date +%Y-%m-%d)"
      git push --set-upstream origin "$BRANCH_NAME" \
        -o merge_request.create \
        -o merge_request.target=main \
        -o merge_request.title="deps: auto-update dependencies $(date +%Y-%m-%d)" \
        -o merge_request.remove_source_branch \
        -o merge_request.label="dependencies"

      # Enrich MR description with audit results via API
      sleep 5
      MR_IID=$(curl --silent --header "PRIVATE-TOKEN: ${RELEASE_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests?state=opened&source_branch=${BRANCH_NAME}" \
        | jq -r '.[0].iid')
      if [ -n "$MR_IID" ] && [ "$MR_IID" != "null" ]; then
        BODY=$(printf '## Automated Dependency Update\n\nPipeline: %s\n\n### Audit Status\n%s\n\n### Changed Packages\n```\n%s\n```\n\n---\n*Created by scheduled pipeline on %s*' \
          "$CI_PIPELINE_URL" "$AUDIT_NOTE" "$SUMMARY" "$(date +%Y-%m-%d)")
        curl --silent --request PUT \
          --header "PRIVATE-TOKEN: ${RELEASE_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "$(jq -n --arg desc "$BODY" '{description: $desc}')" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${MR_IID}" > /dev/null
        echo "Updated MR !${MR_IID} with audit details."
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $DEPS_UPDATE == "true"'
  cache:
    key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR

# =============================================================================
# Documentation Build
# =============================================================================

build-docs:
  stage: build-docs
  image: $UV_IMAGE
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git gcc libc6-dev graphviz libgraphviz-dev pkg-config
  script:
    - uv sync --locked --group docs
    - uv run mkdocs build
  artifacts:
    paths:
      - site/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - docs/**/*
        - mkdocs.yml
        - src/**/*.py
  cache:
    key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR

# =============================================================================
# GitLab Pages Deployment
# =============================================================================

pages:
  stage: pages
  image: busybox:latest
  dependencies:
    - build-docs
  script:
    - mv site public
  artifacts:
    paths:
      - public/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
  environment:
    name: production
    url: https://lalsaado.gitlab.aws.dev/code-context-agent

# =============================================================================
# Build Package
# =============================================================================

build:
  stage: build
  image: $UV_IMAGE
  script:
    - uv build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
  cache:
    key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR

# =============================================================================
# Release (on tags only)
# =============================================================================

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  dependencies:
    - build
  script:
    - VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/^v//')
    - sed -n "/^## v${VERSION}/,/^## v/{/^## v/d;p}" CHANGELOG.md > /tmp/notes.md
    - |
      if [ ! -s /tmp/notes.md ]; then
        echo "Release ${CI_COMMIT_TAG}" > /tmp/notes.md
      fi
    - release-cli create
        --name "Release ${CI_COMMIT_TAG}"
        --tag-name "${CI_COMMIT_TAG}"
        --description "$(cat /tmp/notes.md)"
        --assets-link "{\"name\":\"Python wheel\",\"url\":\"${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/download?job=build\",\"link_type\":\"package\"}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
