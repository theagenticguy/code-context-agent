site_name: code-context-agent
site_url: https://theagenticguy.github.io/code-context-agent
site_description: AI-powered CLI tool for automated codebase analysis and context generation
copyright: Copyright 2025 Laith Al-Saadoon. Apache 2.0 License.
repo_url: https://github.com/theagenticguy/code-context-agent
repo_name: theagenticguy/code-context-agent
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/brain
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/theagenticguy/code-context-agent

plugins:
  - search:
      separator: '[\s\-]+'
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            inherited_members: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            merge_init_into_class: true
            separate_signature: true
            signature_crossrefs: false
            members_order: source
            filters:
              - "!^_"
          import:
            - https://docs.python.org/3/objects.inv
            - https://docs.pydantic.dev/latest/objects.inv
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - git-revision-date-localized:
      type: timeago
      enable_creation_date: true
      fallback_to_build_date: true
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Getting Started:
          - getting-started/installation.md
          - getting-started/configuration.md
          - getting-started/quickstart.md
          - getting-started/check-command.md
          - getting-started/full-mode.md
          - getting-started/viz.md
        Architecture:
          - architecture/overview.md
          - architecture/swarm.md
          - architecture/tenets.md
          - architecture/hooks.md
          - architecture/tui-phases.md
        Tools:
          - tools/overview.md
          - tools/discovery.md
          - tools/search.md
          - tools/lsp.md
          - tools/ast.md
          - tools/graph.md
          - tools/git.md
          - tools/shell.md
          - tools/clones.md
          - tools/mcp.md
          - tools/indexer.md
          - tools/registry.md
          - tools/storage.md
        Security:
          - security/overview.md
        Support:
          - troubleshooting.md
          - faq.md
        Development:
          - development/guide.md
          - development/testing.md
          - development/code-style.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Quick Start: getting-started/quickstart.md
      - Check Command: getting-started/check-command.md
      - Full Mode: getting-started/full-mode.md
      - Visualization: getting-started/viz.md
  - Architecture:
      - Overview: architecture/overview.md
      - Swarm Pipeline: architecture/swarm.md
      - Tenets: architecture/tenets.md
      - Hook System: architecture/hooks.md
      - TUI & Phases: architecture/tui-phases.md
  - Tools:
      - Overview: tools/overview.md
      - Discovery & Search: tools/discovery.md
      - BM25 Search: tools/search.md
      - LSP Integration: tools/lsp.md
      - AST Patterns: tools/ast.md
      - Graph Analysis: tools/graph.md
      - Git History: tools/git.md
      - Shell: tools/shell.md
      - Clone Detection: tools/clones.md
      - MCP Server: tools/mcp.md
      - Deterministic Indexer: tools/indexer.md
      - Multi-Repo Registry: tools/registry.md
      - Graph Storage: tools/storage.md
  - Security:
      - Overview: security/overview.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
  - ADRs:
      - Overview: adr/README.md
      - "0001: Strands Agents": adr/0001-strands-agents-framework.md
      - "0002: NetworkX Code Graph": adr/0002-networkx-multi-layer-code-graph.md
      - "0003: AG-UI (superseded)": adr/0003-ag-ui-event-streaming.md
      - "0004: FastMCP Server": adr/0004-fastmcp-v3-server.md
      - "0005: LSP Fallback Chains": adr/0005-lsp-fallback-chains.md
      - "0006: Security Shell": adr/0006-security-hardened-shell.md
      - "0007: OpenSpec": adr/0007-openspec-spec-driven-development.md
      - "0008: BM25 Search": adr/0008-bm25-ranked-text-search.md
      - "0009: KuzuDB Backend": adr/0009-kuzudb-persistent-graph-backend.md
      - "0010: Multi-Repo Registry": adr/0010-multi-repo-registry.md
      - "0011: Deterministic Indexer": adr/0011-deterministic-indexer.md
      - "0012: Swarm Pipeline": adr/0012-strands-swarm-multi-agent.md
  - Code Reference: reference/
  - Development:
      - Contributing: development/guide.md
      - Testing: development/testing.md
      - Code Style: development/code-style.md
