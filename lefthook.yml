commit-msg:
  jobs:
    - name: conventional-commit
      run: uv run cz check --commit-msg-file {1}

pre-commit:
  parallel: true
  jobs:
    - name: ruff-check
      run: uvx ruff check --fix {staged_files}
      glob: "*.py"
      stage_fixed: true

    - name: ruff-format
      run: uvx ruff format {staged_files}
      glob: "*.py"
      stage_fixed: true

    - name: ty-check
      run: uv run ty check src/

    - name: betterleaks
      run: betterleaks git --pre-commit --staged --no-banner

pre-push:
  parallel: true
  jobs:
    - name: lint
      run: uvx ruff check src/

    - name: format-check
      run: uvx ruff format --check src/

    - name: typecheck
      run: uv run ty check src/

    - name: test
      run: uv run pytest

    - name: betterleaks
      run: betterleaks git --no-banner .

    - name: semgrep
      run: semgrep scan --config auto --config p/python --config p/owasp-top-ten --config p/security-audit --exclude-rule python.flask.security.xss.audit.direct-use-of-jinja2.direct-use-of-jinja2 --error --quiet src/

    - name: bandit
      run: uv run bandit -c pyproject.toml -r src/ --severity-level=high --confidence-level=high

    - name: osv-scanner
      run: osv-scanner scan --lockfile uv.lock || echo "⚠ OSV-Scanner found vulnerabilities (informational)"

    - name: uv-audit
      run: uv audit || echo "uv audit found vulnerabilities (informational)"

    - name: trivy
      run: trivy fs --severity HIGH,CRITICAL . || echo "⚠ Trivy found vulnerabilities (informational)"
