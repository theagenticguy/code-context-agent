commit-msg:
  jobs:
    - name: conventional-commit
      run: uv run cz check --commit-msg-file {1}

pre-commit:
  parallel: true
  jobs:
    - name: ruff-check
      run: uvx ruff check --fix {staged_files}
      glob: "*.py"
      stage_fixed: true

    - name: ruff-format
      run: uvx ruff format {staged_files}
      glob: "*.py"
      stage_fixed: true

    - name: ty-check
      run: uvx ty check src/

    - name: gitleaks
      run: gitleaks protect --staged --no-banner

pre-push:
  parallel: true
  jobs:
    - name: lint
      run: uvx ruff check src/

    - name: format-check
      run: uvx ruff format --check src/

    - name: typecheck
      run: uvx ty check src/

    - name: test
      run: uv run pytest

    - name: gitleaks
      run: gitleaks detect --source . --no-banner

    - name: semgrep
      # ui/ is static JS/CSS/HTML served on localhost only; innerHTML findings are false positives
      run: semgrep scan --config auto --config p/owasp-top-ten --exclude-rule python.flask.security.xss.audit.direct-use-of-jinja2.direct-use-of-jinja2 --exclude src/code_context_agent/ui --error --quiet src/
