commit-msg:
  jobs:
    - name: conventional-commit
      run: uv run cz check --commit-msg-file {1}

pre-commit:
  parallel: true
  jobs:
    - name: ruff-check
      run: uvx ruff check --fix {staged_files}
      glob: "*.py"
      stage_fixed: true

    - name: ruff-format
      run: uvx ruff format {staged_files}
      glob: "*.py"
      stage_fixed: true

    - name: ty-check
      run: uv run ty check src/

    - name: biome-check
      run: pnpm --dir ui lint
      glob: "ui/**/*.{ts,tsx,js,jsx}"

    - name: gitleaks
      run: gitleaks protect --staged --no-banner

pre-push:
  parallel: true
  jobs:
    - name: lint
      run: uvx ruff check src/

    - name: format-check
      run: uvx ruff format --check src/

    - name: typecheck
      run: uv run ty check src/

    - name: test
      run: uv run pytest

    - name: ui-lint
      run: pnpm --dir ui lint

    - name: ui-typecheck
      run: pnpm --dir ui typecheck

    - name: gitleaks
      run: gitleaks detect --source . --no-banner

    - name: semgrep
      run: semgrep scan --config auto --config p/owasp-top-ten --exclude-rule python.flask.security.xss.audit.direct-use-of-jinja2.direct-use-of-jinja2 --error --quiet src/

    - name: osv-scanner
      run: osv-scanner scan --lockfile uv.lock --lockfile ui/pnpm-lock.yaml || echo "⚠ OSV-Scanner found vulnerabilities (informational)"

    - name: trivy
      run: trivy fs --severity HIGH,CRITICAL . || echo "⚠ Trivy found vulnerabilities (informational)"
