[tools]
gitleaks = "latest"
python = "3.13"
semgrep = "latest"
uv = "latest"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks]
install = "uv sync --all-groups"

[tasks.lint]
description = "Lint with ruff"
run = "uvx ruff check src/"

[tasks."lint:fix"]
description = "Lint and auto-fix"
run = "uvx ruff check src/ --fix"

[tasks.format]
description = "Format with ruff"
run = "uvx ruff format src/"

[tasks."format:check"]
description = "Check formatting"
run = "uvx ruff format --check src/"

[tasks.typecheck]
description = "Type check with ty"
run = "uvx ty check src/"

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks."test:verbose"]
description = "Run tests with verbose output"
run = "uv run pytest -v"

[tasks.security]
description = "Run all security scans (gitleaks + semgrep + pip-audit)"
depends = ["security:secrets", "security:sast", "security:deps"]

[tasks."security:secrets"]
description = "Scan for secrets with gitleaks"
run = "gitleaks detect --source . --no-banner"

[tasks."security:sast"]
description = "SAST scan with semgrep (auto + OWASP top 10)"
run = "semgrep scan --config auto --config p/owasp-top-ten --error --quiet src/"

[tasks."security:deps"]
description = "Audit dependencies for known vulnerabilities"
run = "uv run pip-audit"

[tasks.check]
description = "Run all checks (lint + format + typecheck + test)"
depends = ["lint", "format:check", "typecheck", "test"]

[tasks."docs:serve"]
description = "Serve documentation site with live reload"
run = "uv run mkdocs serve"

[tasks."docs:build"]
description = "Build documentation site"
run = "uv run mkdocs build"

[tasks.bump]
description = "Bump version using commitizen"
run = "uv run cz bump"

[tasks.release]
description = "Bump version, generate changelog, tag, and push"
shell = "bash"
run = """
set -euo pipefail
uv run cz bump
VERSION=$(uv run cz version)
git push origin HEAD
git push origin "v${VERSION}"
"""

[tasks.commit]
description = "Interactive conventional commit"
run = "uv run cz commit"
