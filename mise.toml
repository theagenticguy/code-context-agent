[tools]
gitleaks = "latest"
osv-scanner = "latest"
python = "3.13"
semgrep = "latest"
syft = "latest"
trivy = "latest"
uv = "latest"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks]
install = "uv sync --all-groups"

[tasks.lint]
description = "Lint with ruff"
run = "uvx ruff check src/"

[tasks."lint:fix"]
description = "Lint and auto-fix"
run = "uvx ruff check src/ --fix"

[tasks.format]
description = "Format with ruff"
run = "uvx ruff format src/"

[tasks."format:check"]
description = "Check formatting"
run = "uvx ruff format --check src/"

[tasks.typecheck]
description = "Type check with ty"
run = "uvx ty check src/"

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks."test:verbose"]
description = "Run tests with verbose output"
run = "uv run pytest -v"

[tasks.security]
description = "Run all security scans"
depends = ["security:secrets", "security:sast", "security:bandit", "security:deps", "security:licenses", "security:typosquat"]

[tasks."security:secrets"]
description = "Scan for secrets with gitleaks"
run = "gitleaks detect --source . --no-banner"

[tasks."security:sast"]
description = "SAST scan with semgrep (auto + OWASP top 10)"
run = "semgrep scan --config auto --config p/owasp-top-ten --error --quiet src/"

[tasks."security:bandit"]
description = "SAST scan with bandit (fail on HIGH severity)"
shell = "bash"
run = """
set -euo pipefail
uv run bandit -c pyproject.toml -r src/ -f json -o bandit-report.json --exit-zero
uv run bandit -c pyproject.toml -r src/ --severity-level=high --confidence-level=high
"""

[tasks."security:deps"]
description = "Audit dependencies for known vulnerabilities (osv-scanner)"
run = "osv-scanner scan --lockfile uv.lock"

[tasks."security:licenses"]
description = "Check 3P dependency licenses against allowlist"
run = "uv run --with pip-licenses pip-licenses"

[tasks."security:typosquat"]
description = "Check dependencies for typosquatting and malicious patterns"
shell = "bash"
run = """
set -euo pipefail
uv export --no-hashes --format requirements-txt > /tmp/requirements.txt
uvx guarddog pypi verify /tmp/requirements.txt
"""

[tasks."security:sbom"]
description = "Generate CycloneDX and SPDX SBOMs via syft"
run = "syft . -o cyclonedx-json=sbom.cdx.json -o spdx-json=sbom.spdx.json"

[tasks."security:report"]
description = "Run all security scans and produce a unified JSON report"
run = "uv run python scripts/security_report.py --output security-report.json"

[tasks."test:coverage"]
description = "Run tests with coverage"
run = "uv run pytest --cov=src/code_context_agent --cov-report=term-missing:skip-covered --cov-report=xml:coverage.xml --cov-branch"

[tasks.check]
description = "Run all checks (lint + format + typecheck + test)"
depends = ["lint", "format:check", "typecheck", "test"]

[tasks."docs:serve"]
description = "Serve documentation site with live reload"
run = "uv run mkdocs serve"

[tasks."docs:build"]
description = "Build documentation site"
run = "uv run mkdocs build"

[tasks.bump]
description = "Bump version using commitizen"
run = "uv run cz bump"

[tasks.release]
description = "Bump version, generate changelog, tag, and push"
shell = "bash"
run = """
set -euo pipefail
uv run cz bump
VERSION=$(uv run cz version)
git push origin HEAD
git push origin "v${VERSION}"
"""

[tasks.commit]
description = "Interactive conventional commit"
run = "uv run cz commit"
