name: Version Bump

on:
  push:
    branches: [main]

permissions: read-all

env:
  UV_CACHE_DIR: .uv-cache

jobs:
  bump:
    # Skip commits from this workflow to prevent infinite loops
    if: github.event.head_commit.author.username != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.BUMP_TOKEN }}

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz libgraphviz-dev pkg-config

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push
        run: |
          # Exit code 21 = NoneIncrementExit (nothing to bump) — not an error
          bash scripts/release.sh || {
            exit_code=$?
            if [ "$exit_code" -eq 21 ]; then
              echo "No version increment needed — skipping."
              exit 0
            fi
            exit "$exit_code"
          }
