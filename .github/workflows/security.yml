name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    container:
      image: semgrep/semgrep:1.76.0@sha256:1cbeb7b17cdcf5527b0638b5a9042d0ac06432b517416508534266ae8979b670
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Semgrep scan
        run: |
          semgrep scan \
            --config auto \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --exclude-rule python.flask.security.xss.audit.direct-use-of-jinja2.direct-use-of-jinja2 \
            --sarif \
            --output semgrep.sarif \
            --error \
            src/
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  bandit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz libgraphviz-dev pkg-config
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Bandit scan
        run: uv run bandit -c pyproject.toml -r src/ -f sarif -o bandit.sarif --exit-zero
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: bandit.sarif
          category: bandit

  betterleaks:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Install betterleaks
        env:
          BETTERLEAKS_VERSION: "1.1.1"
        run: |
          TARBALL="betterleaks_${BETTERLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/betterleaks/betterleaks/releases/download/v${BETTERLEAKS_VERSION}/${TARBALL}" \
            -o "/tmp/${TARBALL}"
          curl -sSfL "https://github.com/betterleaks/betterleaks/releases/download/v${BETTERLEAKS_VERSION}/checksums.txt" \
            -o /tmp/checksums.txt
          cd /tmp && grep "${TARBALL}" checksums.txt | sha256sum -c -
          sudo tar -xzf "/tmp/${TARBALL}" -C /usr/local/bin betterleaks
      - name: Betterleaks secret scan
        run: betterleaks git --no-banner -f sarif -r betterleaks.sarif .
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: betterleaks.sarif
          category: betterleaks
        continue-on-error: true

  osv-scanner:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: OSV Scanner
        id: scan
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        continue-on-error: true # findings are surfaced via SARIF + step summary, not CI failure
        with:
          scan-args: |-
            --lockfile=uv.lock
            --lockfile=ui/pnpm-lock.yaml
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: results.sarif
          category: osv-scanner
        continue-on-error: true
      - name: Summarize findings
        if: always() && steps.scan.outcome == 'failure'
        run: |
          echo "### :shield: OSV Scanner — dependency vulnerabilities detected" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f results.sarif ]; then
            echo "| Package | Severity | Advisory |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---------|----------|----------|" >> "$GITHUB_STEP_SUMMARY"
            jq -r '
              .runs[].results[] |
              .message.text as $msg |
              .ruleId as $id |
              ($msg | capture("Package: (?<pkg>[^ ]+)") // {pkg: "unknown"}) |
              "| \(.pkg) | \($id | split("-")[0] // "unknown") | [\($id)](https://osv.dev/\($id)) |"
            ' results.sarif >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || \
            jq -r '.runs[].results[] | "- **\(.ruleId)**: \(.message.text | .[0:120])"' results.sarif >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || \
            echo "See [Code Scanning alerts](/${{ github.repository }}/security/code-scanning?query=tool:osv-scanner) for details." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Findings are informational. Fix by upgrading affected packages when patches become available." >> "$GITHUB_STEP_SUMMARY"

  trivy:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: trivy.sarif
          category: trivy

  uv-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Audit dependencies
        run: uv audit

  licenses:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz libgraphviz-dev pkg-config
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: License check
        run: uv run --with pip-licenses pip-licenses
      - name: Generate reports
        run: |
          uv run --with pip-licenses pip-licenses --format=json --output-file=license-report.json
          uv run --with pip-licenses pip-licenses --format=markdown --output-file=license-report.md
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: license-reports
          path: |
            license-report.json
            license-report.md
          retention-days: 7

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOMs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom
          path: |
            sbom.cdx.json
            sbom.spdx.json
          retention-days: 7

  grype:
    runs-on: ubuntu-latest
    needs: sbom
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom
      - name: Install Grype
        id: grype
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
      - name: Grype SBOM scan
        run: |
          ${{ steps.grype.outputs.cmd }} sbom:sbom.cdx.json \
            --fail-on high \
            --output sarif \
            --file grype.sarif
        continue-on-error: true
      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: grype.sarif
          category: grype
