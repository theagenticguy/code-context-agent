# ──────────────────────────────────────────────────────────────
# Rescan — Event-driven vulnerability re-scanning
# ──────────────────────────────────────────────────────────────
# Runs nightly + on manual trigger to rescan against updated
# vulnerability databases. Catches newly disclosed CVEs in
# already-deployed artifacts.
# ──────────────────────────────────────────────────────────────
name: Rescan on Advisory

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  rescan-sbom:
    name: SBOM Rescan (Grype + OSV-Scanner)
    runs-on: ubuntu-latest
    outputs:
      findings: ${{ steps.check-findings.outputs.found }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Generate fresh SBOM for scanning
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      # Grype: scan SBOM against latest vuln DB
      - name: Install Grype
        id: grype
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0

      - name: Grype SBOM scan
        id: grype-scan
        run: |
          ${{ steps.grype.outputs.cmd }} sbom:sbom.cdx.json \
            --fail-on high \
            --output sarif \
            --file grype-results.sarif
        continue-on-error: true

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: grype-results.sarif
          category: grype

      # OSV-Scanner: check lockfiles against OSV database
      - name: OSV-Scanner lockfile scan
        id: osv
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          scan-args: |-
            --lockfile=uv.lock
            --lockfile=ui/pnpm-lock.yaml
        continue-on-error: true

      - name: Upload OSV-Scanner SARIF
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: results.sarif
          category: osv-scanner-rescan
        continue-on-error: true

      - name: Check for findings
        id: check-findings
        if: always()
        run: |
          if [[ "${{ steps.grype-scan.outcome }}" == "failure" || "${{ steps.osv.outcome }}" == "failure" ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

  rescan-fs:
    name: Filesystem Rescan (Trivy)
    runs-on: ubuntu-latest
    outputs:
      findings: ${{ steps.check-findings.outputs.found }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Trivy filesystem rescan
        id: trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-rescan.sarif
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: trivy-rescan.sarif
          category: trivy

      - name: Check for findings
        id: check-findings
        if: always()
        run: |
          if [[ "${{ steps.trivy.outcome }}" == "failure" ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

  alert:
    name: Open Issue on Findings
    needs: [rescan-sbom, rescan-fs]
    if: always() && (needs.rescan-sbom.outputs.findings == 'true' || needs.rescan-fs.outputs.findings == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "automated" --description "Automatically generated by CI/CD" --color "0e8a16" --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create "security" --description "Security-related issues" --color "b60205" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Check for existing open issue
        id: check-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "security,automated" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')
          echo "existing=$existing" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Issue for new vulnerabilities
        if: steps.check-issue.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Nightly rescan: new HIGH+ vulnerabilities found ($(date -u +%Y-%m-%d))" \
            --label "security,automated" \
            --body "$(cat <<'BODY'
          ## Nightly Vulnerability Rescan Alert

          The scheduled rescan workflow detected new HIGH or CRITICAL vulnerabilities.

          **SBOM Rescan findings:** ${{ needs.rescan-sbom.outputs.findings }}
          **Filesystem Rescan findings:** ${{ needs.rescan-fs.outputs.findings }}

          ### Next Steps
          1. Review findings in the [Security tab](/${{ github.repository }}/security/code-scanning)
          2. Triage and remediate HIGH+ findings
          3. Run \`mise run security\` locally to reproduce

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BODY
          )"

      - name: Comment on existing issue
        if: steps.check-issue.outputs.existing != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.check-issue.outputs.existing }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<BODY
          **Rescan update ($(date -u +%Y-%m-%d)):** vulnerabilities still present.

          **SBOM Rescan findings:** ${{ needs.rescan-sbom.outputs.findings }}
          **Filesystem Rescan findings:** ${{ needs.rescan-fs.outputs.findings }}

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BODY
          )"
