name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

env:
  UV_CACHE_DIR: .uv-cache

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz libgraphviz-dev pkg-config
      - name: Install Python dependencies
        run: uv sync --locked --all-groups
      - name: Ruff check
        run: uv run ruff check src/
      - name: Ruff format check
        run: uv run ruff format --check src/
      - name: Type check
        run: uv run ty check src/

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: latest
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends git graphviz libgraphviz-dev pkg-config
      - name: Install Python dependencies
        run: uv sync --locked --all-groups
      - name: Build frontend
        run: pnpm --dir ui install --frozen-lockfile && pnpm --dir ui build
      - name: Run tests
        run: |
          uv run pytest \
            --junitxml=report.xml \
            --cov=src/code_context_agent \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-branch
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage
          path: |
            coverage.xml
            report.xml
          retention-days: 7
