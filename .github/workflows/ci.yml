name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  UV_CACHE_DIR: .uv-cache

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz libgraphviz-dev pkg-config
      - name: Install Python dependencies
        run: uv sync --locked --all-groups
      - name: Ruff check
        run: uv run ruff check src/
      - name: Ruff format check
        run: uv run ruff format --check src/
      - name: Type check
        run: uv run ty check src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends git graphviz libgraphviz-dev pkg-config
      - name: Install Python dependencies
        run: uv sync --locked --all-groups
      - name: Run tests
        run: |
          uv run pytest \
            --junitxml=report.xml \
            --cov=src/code_context_agent \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-branch
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.xml
            report.xml
          retention-days: 7
