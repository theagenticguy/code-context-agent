name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  RUNTIME_PKGS: graphviz libgraphviz-dev

jobs:
  build-docs:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:0.9-python3.13-bookworm-slim
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install system dependencies
        run: apt-get update && apt-get install -y --no-install-recommends git ${{ env.RUNTIME_PKGS }} gcc libc6-dev pkg-config
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Build docs
        run: uv run mkdocs build
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
