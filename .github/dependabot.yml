# ──────────────────────────────────────────────────────────────
# Dependabot — Automated dependency updates
# ──────────────────────────────────────────────────────────────
version: 2

updates:
  # ── Python (pip / pyproject.toml) ──────────────────────────
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(python):"
    labels:
      - dependencies
      - python
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  # ── GitHub Actions (.github/workflows/) ────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(actions):"
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # ── npm (ui/) ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(npm):"
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
